name: Intraday Odds Refresh

on:
  schedule:
    # Keep PrizePicks/props snapshots fresh throughout the day.
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: intraday-odds-refresh
  cancel-in-progress: true

jobs:
  refresh-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Refresh odds + publish Supabase snapshot
        run: python refresh_odds.py
        timeout-minutes: 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
