name: Intraday Odds Refresh

on:
  schedule:
    # Keep PrizePicks/props snapshots fresh throughout the day.
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: kbo-refresh-pipeline
  cancel-in-progress: false

jobs:
  refresh-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          # Playwright is the fallback path for Baseball Reference (their CDN
          # often returns 403 to GitHub Actions IPs). Without the browser,
          # build_opponent_stats falls back to nothing and we'd preserve the
          # prior snapshot — but that means stats stop refreshing entirely.
          playwright install chromium --with-deps

      - name: Refresh odds + publish Supabase snapshot
        run: |
          for attempt in 1 2 3; do
            echo "Refresh attempt ${attempt}/3"
            if python refresh_odds.py; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Refresh failed, retrying in 20s..."
              sleep 20
            fi
          done
          echo "Refresh failed after 3 attempts"
          exit 1
        timeout-minutes: 20
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Commit refreshed odds snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kbo-props-ui/public/data/prizepicks_props.json KBO-Odds/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No odds changes to commit"
          else
            git commit -m "chore: intraday odds refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push || echo "Push failed (likely race with concurrent run) — continuing to deploy current build"
          fi

      - name: Build and deploy odds-only update to Vercel
        run: |
          npm i -g vercel@latest
          # Lightweight: build with fresh prizepicks_props.json + ship to prod.
          # Skip-odds avoids re-fetching (we already did it above) and
          # skip-full-refresh avoids the 30+ min stat scrape pipeline.
          bash pipeline/run_release.sh --skip-odds --skip-full-refresh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        timeout-minutes: 10

      # Email-on-failure: create/update a GitHub issue when this scheduled
      # job fails. GitHub's default notification settings will email the repo
      # owner whenever an issue is opened or commented on.
      - name: Notify on failure (open/update issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TITLE="🚨 Intraday odds refresh FAILED"
          BODY="Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Branch: $GITHUB_REF_NAME
          Commit: $GITHUB_SHA"
          # Try to find an existing open issue with this title; comment on it
          # so we don't spam new issues every 10 min during an outage.
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "ci-failure" 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
