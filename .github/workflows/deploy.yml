name: Refresh Data & Deploy to Vercel

on:
  schedule:
    # Once daily at 3 AM UTC: full redeploy to keep the Vercel build fresh.
    # Live data is now served by data-refresh.yml + raw.githubusercontent.com —
    # no need to redeploy Vercel for every data update.
    - cron: "0 3 * * *" # 3:00 AM UTC = 12:00 PM KST
  push:
    branches: [main]
    # Don't rebuild the site just because a data file changed — the frontend
    # reads data directly from GitHub raw at runtime.
    paths-ignore:
      - "kbo-props-ui/public/data/**"
      - "Batters-Data/**"
      - "Pitchers-Data/**"
      - "KBO-Odds/**"
      - "**.csv"
      - "game_logs_2025.csv"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        continue-on-error: true

      - name: Run refresh pipeline
        run: python refresh.py
        timeout-minutes: 15
        continue-on-error: true

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kbo-props-ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kbo-props-ui

      - name: Build site
        run: npm run build
        working-directory: kbo-props-ui
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          cd kbo-props-ui
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
