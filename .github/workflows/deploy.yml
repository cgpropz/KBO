name: Refresh Data & Deploy Site

on:
  # Run daily at 8:00 UTC (5:00 PM KST — before evening KBO games)
  schedule:
    - cron: "0 8 * * *"
  # Also run on push to main
  push:
    branches: [main]
  # Manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # ── Write Google credentials from secret ──────────────────
      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      # ── Run data pipeline ─────────────────────────────────────
      - name: Run refresh pipeline
        run: python refresh.py
        timeout-minutes: 10

      # ── Commit updated data files back to repo ────────────────
      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      # ── Node.js setup & build ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kbo-props-ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kbo-props-ui

      - name: Build site
        run: npm run build
        working-directory: kbo-props-ui
        env:
          GITHUB_PAGES: true

      # ── Deploy to GitHub Pages ────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: kbo-props-ui/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
