name: Refresh Data & Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      # Data file changes (kbo-props-ui/public/data/**) are intentionally
      # excluded here. Those commits are generated by the intraday odds
      # refresh workflow and must NOT re-trigger a full 14-minute deploy.
      # Only code/config/pipeline changes should kick off a full redeploy.
      - "pipeline/**"
      - ".github/workflows/**"
      - "refresh_data.py"
      - "refresh_odds.py"
      - "generate_*.py"
      - "build_opponent_stats.py"
      - "_build_player_photos.py"
      - "kbo-props-ui/src/**"
      - "kbo-props-ui/public/index.html"
      - "kbo-props-ui/package*.json"
      - "kbo-props-ui/vite.config.*"
  schedule:
    # Full refresh + deploy spread across the afternoon (US Eastern).
    # GitHub schedule uses UTC.
    - cron: "0 16 * * *" # 12:00 PM ET
    - cron: "0 18 * * *" # 2:00 PM ET
    - cron: "0 19 * * *" # 3:00 PM ET
    - cron: "0 20 * * *" # 4:00 PM ET
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: kbo-refresh-pipeline
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        continue-on-error: true

      - name: Run full data refresh (stats, logs, projections, player props)
        run: |
          bash pipeline/run_release.sh --skip-deploy

      - name: Check for duplicate data generation steps
        run: |
          if grep -E 'python.*(refresh_data\.py|refresh_odds\.py)' .github/workflows/deploy.yml | grep -v 'pipeline/run_release.sh'; then
            echo "ERROR: Data generation scripts must only be run once via pipeline/run_release.sh."
            exit 1
          fi
        shell: bash
        continue-on-error: false

      # Removed redundant odds refresh step to prevent stale data

      - name: Verify all public data snapshots (fail if missing/stale)
        run: |
          # Keep deploys unblocked when some props-player headshots are unavailable.
          # The script still fails for stale/missing core snapshots.
          python pipeline/verify_local_data.py --max-missing-photos 25
        timeout-minutes: 45
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if ! git push origin HEAD:main; then
              echo "Push rejected; attempting one rebase+push retry"
              git pull --rebase origin main || echo "Rebase failed (likely conflict); continuing to deploy current build"
              git push origin HEAD:main || echo "Retry push failed (likely race/merge conflict) — continuing to deploy current build"
            fi
          fi

      - name: Deploy to Vercel
        run: |
          npm i -g vercel@latest
          # IMPORTANT: do NOT pass --skip-build. We need to build locally so the
          # VITE_* env vars below get baked into the bundle. If we skip the build,
          # Vercel's own builder runs without our system env vars and the deployed
          # JS may be missing Supabase config (root cause of GH-Actions deploys
          # silently shipping a broken bundle).
          bash pipeline/run_release.sh --skip-odds --skip-full-refresh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify production data (strict)
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "Production verify attempt ${attempt}/6"
            if python pipeline/verify_production_data.py --base-url https://mykboprops.com --strict; then
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              echo "Verification not green yet, retrying in 30s..."
              sleep 30
            fi
          done
          echo "Production verification failed after retries"
          exit 1

      # Email-on-failure: open or update a GitHub issue when this scheduled
      # full pipeline fails. GitHub's default notification settings will email
      # the repo owner whenever an issue is opened or commented on.
      - name: Notify on failure (open/update issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TITLE="🚨 Full refresh + deploy FAILED"
          BODY="Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Branch: $GITHUB_REF_NAME
          Commit: $GITHUB_SHA"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "ci-failure" 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
