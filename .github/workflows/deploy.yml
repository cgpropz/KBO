name: Refresh Data & Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "kbo-props-ui/public/data/**"
      - "pipeline/**"
      - ".github/workflows/**"
      - "refresh_data.py"
      - "refresh_odds.py"
      - "generate_*.py"
      - "build_opponent_stats.py"
      - "_build_player_photos.py"
      - "Pitchers-Data/**"
      - "Batters-Data/**"
  schedule:
    # Once daily full refresh + deploy.
    # GitHub schedule uses UTC; 16:00 UTC is around noon US Eastern.
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kbo-refresh-pipeline
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        continue-on-error: true

      - name: Run full data refresh (stats, logs, projections, player props)
        run: |
          bash pipeline/run_release.sh --skip-deploy

      # Removed redundant odds refresh step to prevent stale data

      - name: Verify all public data snapshots (fail if missing/stale)
        run: |
          python pipeline/verify_local_data.py --strict
        timeout-minutes: 45
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Verify generated local snapshots
        run: |
          python pipeline/verify_local_data.py --strict

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          bash pipeline/run_release.sh --skip-odds --skip-full-refresh --skip-build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify production data (strict)
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "Production verify attempt ${attempt}/6"
            if python pipeline/verify_production_data.py --base-url https://mykboprops.com --strict; then
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              echo "Verification not green yet, retrying in 30s..."
              sleep 30
            fi
          done
          echo "Production verification failed after retries"
          exit 1
