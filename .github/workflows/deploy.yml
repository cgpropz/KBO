name: Refresh Data & Deploy to Vercel

on:
  schedule:
    # KBO games typically start 5-6:30 PM KST (= 8-9:30 AM UTC / 4-5:30 AM ET)
    # Run at these UTC times to capture fresh data throughout the day:
    - cron: "0 3 * * *"    #  3:00 AM UTC = 12:00 PM KST (pre-game)
    - cron: "0 5 * * *"    #  5:00 AM UTC =  2:00 PM KST (early games)
    - cron: "0 8 * * *"    #  8:00 AM UTC =  5:00 PM KST (main slate)
    - cron: "30 9 * * *"   #  9:30 AM UTC =  6:30 PM KST (late games)
    - cron: "0 12 * * *"   # 12:00 PM UTC =  9:00 PM KST (post-game results)
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        continue-on-error: true

      - name: Run refresh pipeline
        run: python refresh.py
        timeout-minutes: 15
        continue-on-error: true

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kbo-props-ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kbo-props-ui

      - name: Build site
        run: npm run build
        working-directory: kbo-props-ui

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          mkdir -p kbo-props-ui/dist/.vercel
          echo '{"projectId":"prj_HgdvsekuqCfqzKYvGAUD6gQi36AW","orgId":"team_NsMEVaPP3l5Ouz0DWr1y9cxU"}' > kbo-props-ui/dist/.vercel/project.json
          cd kbo-props-ui/dist
          vercel --yes --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
